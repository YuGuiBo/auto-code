process:
  key: reimbursementProcess
  name: 报销申请流程
  apiPrefix: /api/reimbursement
  version: 1.0.0
  description: 费用报销审批流程

statuses:
  SUBMITTED:
    displayName: 已提交
    description: 报销申请已提交
  PENDING_MANAGER_APPROVAL:
    displayName: 待经理审批
    description: 等待经理审批
  PENDING_DEPT_MANAGER_APPROVAL:
    displayName: 待部门经理审批
    description: 等待部门经理审批
  PENDING_FINANCE_APPROVAL:
    displayName: 待财务审批
    description: 等待财务审批
  APPROVED:
    displayName: 已批准
    description: 报销申请已批准
  REJECTED:
    displayName: 已拒绝
    description: 报销申请已被拒绝

tasks:
  # 直接经理审批
  - taskName: 直接经理审批
    taskKey: managerApproval
    approvalType: manager
    variables:
      approvalResult: managerApproved
      commentField: managerComment
    statusMapping:
      approved: PENDING_MANAGER_APPROVAL  # 保持当前状态，让BPMN网关决定
      rejected: REJECTED
  
  # 部门经理审批
  - taskName: 部门经理审批
    taskKey: deptManagerApproval
    approvalType: dept-manager
    variables:
      approvalResult: deptManagerApproved
      commentField: deptManagerComment
    statusMapping:
      approved: PENDING_DEPT_MANAGER_APPROVAL  # 保持当前状态
      rejected: REJECTED
  
  # 财务审批
  - taskName: 财务审批
    taskKey: financeApproval
    approvalType: finance
    variables:
      approvalResult: financeApproved
      commentField: financeComment
    statusMapping:
      approved: APPROVED
      rejected: REJECTED

initialization:
  defaultStatus: PENDING_MANAGER_APPROVAL
  businessRules: []

requiredFields:
  - applicantName
  - amount
  - reimbursementType
  - description
