process:
  key: businessTripProcess
  name: 出差申请流程
  apiPrefix: /api/business-trip
  version: 1.0.0
  description: 支持多级审批的出差流程，根据出差天数自动路由

statuses:
  SUBMITTED:
    displayName: 已提交
    description: 出差申请已提交
  PENDING_MANAGER_APPROVAL:
    displayName: 待直接经理审批
    description: 等待直接经理审批
  PENDING_DEPT_MANAGER_APPROVAL:
    displayName: 待部门经理审批
    description: 等待部门经理审批（长期出差>3天）
  PENDING_ADMIN_APPROVAL:
    displayName: 待行政审批
    description: 等待行政部门审批
  APPROVED:
    displayName: 已批准
    description: 出差申请已批准
  REJECTED:
    displayName: 已拒绝
    description: 出差申请已被拒绝

tasks:
  # 直接经理审批
  - taskName: 直接经理审批
    taskKey: managerApproval
    approvalType: manager
    variables:
      approvalResult: managerApproved
      commentField: managerComment
    statusMapping:
      approved: PENDING_MANAGER_APPROVAL  # 保持当前状态，让BPMN网关决定
      rejected: REJECTED
  
  # 部门经理审批（仅长期出差>3天）
  - taskName: 部门经理审批
    taskKey: deptManagerApproval
    approvalType: dept-manager
    variables:
      approvalResult: deptManagerApproved
      commentField: deptManagerComment
    statusMapping:
      approved: PENDING_DEPT_MANAGER_APPROVAL  # 保持当前状态
      rejected: REJECTED
  
  # 行政审批
  - taskName: 行政审批
    taskKey: adminApproval
    approvalType: admin
    variables:
      approvalResult: adminApproved
      commentField: adminComment
    statusMapping:
      approved: APPROVED
      rejected: REJECTED

initialization:
  defaultStatus: PENDING_MANAGER_APPROVAL
  businessRules: []

requiredFields:
  - applicantName
  - destination
  - days
  - purpose
