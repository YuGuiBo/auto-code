spring:
  application:
    name: auto-code
  
  # 数据库配置
  datasource:
    url: jdbc:postgresql://127.0.0.1:15432/Asset
    username: asset
    password: asset
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  # JPA配置
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

# Flowable配置
flowable:
  # 🔄 禁用自动文件扫描（改为从数据库加载）
  # process-definition-location-prefix: classpath*:/processes/
  # process-definition-location-suffixes: "**.bpmn20.xml,**.bpmn"
  
  # ✅ 禁用自动部署，改为手动部署
  check-process-definitions: false
  
  # 数据库配置
  database-schema-update: true
  
  # 异步执行器配置
  async-executor-activate: true
  
  # 历史记录级别（full: 记录所有历史信息）
  history-level: full

# 🆕 应用配置
app:
  process:
    migration:
      # 数据迁移开关：首次启动时启用，迁移完成后可以设为false
      enabled: false

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /

# 日志配置
logging:
  level:
    root: INFO
    # Flowable框架日志 - 只显示警告和错误
    org.flowable: WARN
    org.flowable.engine.impl.persistence.entity: WARN
    # Spring框架日志
    org.springframework.web: INFO
    org.springframework.jdbc: WARN
    # Hibernate日志 - 关闭SQL日志
    org.hibernate: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    # 应用日志 - 只显示重要信息
    com.example.flowable: INFO
    # 特定包可以开启DEBUG（按需调整）
    # com.example.flowable.dynamic.service.BusinessRuleEngine: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/auto-code.log
    max-size: 10MB
    max-history: 7